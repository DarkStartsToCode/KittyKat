<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Nokia 3310 Snake</title>
  <style>
    :root { --bg:#d4d3d3; --grid-border:#c00; --snake:#0074D9; --apple:#ffb400; --overlay-bg:rgba(0,0,0,0.95); }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: var(--bg);
      color: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    h1 { margin: 0; font-size: 1.25rem; text-transform:capitalize; }
    .scoreDisplay { font-weight:600; }

    .grid {
      width: 200px;
      height: 200px;
      border: 1px solid var(--grid-border);
      display: flex;
      flex-wrap: wrap;
      background: #fff;
    }
    .grid div { width: 20px; height: 20px; box-sizing: border-box; }
    .snake { background: var(--snake); }
    .apple { background: var(--apple); border-radius: 50%; }

    .controls { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
    .controls button { padding:8px 12px; border-radius:6px; border:1px solid #999; background:#fff; cursor:pointer; }

    .popup {
      display:none;
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:#202020;
      color:#fff;
      padding:18px;
      border-radius:8px;
      min-width:180px;
      text-align:center;
      box-shadow:0 6px 18px rgba(0,0,0,.5);
      z-index:2000;
    }
    .popup button { margin-top:10px; }

    /* Gatekeeper overlay (client-side "password") */
    #gatekeeper {
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--overlay-bg);
      color:white;
      z-index:9999;
      flex-direction:column;
      gap:12px;
    }
    #gatekeeper .panel {
      background:transparent;
      display:flex;
      gap:8px;
      align-items:center;
    }
    #passInput {
      padding:8px;
      border-radius:6px;
      border:1px solid #666;
    }
    @media (max-width:420px){
      .grid { width:240px; height:240px; }
      .grid div { width:24px; height:24px; }
    }
  </style>
</head>
<body>
  <div id="gatekeeper" role="dialog" aria-modal="true" aria-label="Private access overlay">
    <h1 style="margin:0 0 8px 0;">PRIVATE ACCESS</h1>
    <div class="panel">
      <input id="passInput" type="password" placeholder="Enter Code" aria-label="Enter access code">
      <button id="enterBtn">ENTER</button>
    </div>
    <div style="font-size:0.85rem; opacity:0.9; margin-top:8px;">This is client-side. Keep playing if you know the code.</div>
  </div>

  <h1>Nokia 3310 snake</h1>
  <div class="scoreDisplay" aria-live="polite">Score: 0</div>

  <div class="grid" aria-hidden="false"></div>

  <div class="controls" aria-hidden="false">
    <button class="top" aria-label="Up">↑</button>
    <button class="left" aria-label="Left">←</button>
    <button class="right" aria-label="Right">→</button>
    <button class="bottom" aria-label="Down">↓</button>
  </div>

  <div class="popup" role="dialog" aria-modal="true" id="gameOverPopup">
    <div id="gameOverText" style="font-weight:700;">Game Over</div>
    <div id="finalScore">Score: 0</div>
    <button class="playAgain">Play Again</button>
  </div>

  <script>
    // --- Gatekeeper (client-side) ---
    (function(){
      const gate = document.getElementById('gatekeeper');
      const input = document.getElementById('passInput');
      const enterBtn = document.getElementById('enterBtn');
      const CODE = "1234"; // change if you want a different code

      function checkPass() {
        if (input.value === CODE) {
          gate.style.display = 'none';
        } else {
          // keep it simple: shake input or focus back
          input.value = '';
          input.focus();
        }
      }
      enterBtn.addEventListener('click', checkPass);
      input.addEventListener('keydown', function(e){
        if (e.key === 'Enter') checkPass();
      });
      // optionally autofocus
      input.focus();
    })();

    // --- Snake game ---
    (function(){
      const gridEl = document.querySelector('.grid');
      const scoreDisplay = document.querySelector('.scoreDisplay');
      const popup = document.getElementById('gameOverPopup');
      const finalScore = document.getElementById('finalScore');
      const playAgainBtn = document.querySelector('.playAgain');

      const btnUp = document.querySelector('.top');
      const btnLeft = document.querySelector('.left');
      const btnRight = document.querySelector('.right');
      const btnDown = document.querySelector('.bottom');

      const width = 10;
      const totalSquares = width * width;
      let squares = [];
      let currentSnake = [2,1,0];
      let direction = 1; // +1 right, -1 left, +width down, -width up
      let appleIndex = 0;
      let score = 0;
      let speed = 0.9; // multiplier
      let intervalTime = 1000;
      let intervalId = null;

      function createBoard(){
        gridEl.innerHTML = '';
        squares = [];
        for (let i = 0; i < totalSquares; i++){
          const cell = document.createElement('div');
          gridEl.appendChild(cell);
          squares.push(cell);
        }
      }

      function startGame(){
        // clear previous
        clearInterval(intervalId);
        squares.forEach(sq => sq.className = '');
        currentSnake = [2,1,0];
        direction = 1;
        score = 0;
        intervalTime = 500;
        scoreDisplay.textContent = 'Score: ' + score;
        popup.style.display = 'none';

        // draw snake
        currentSnake.forEach(i => squares[i].classList.add('snake'));

        // place apple
        randomApple();

        intervalId = setInterval(moveOutcome, intervalTime);
      }

      function moveOutcome(){
        if (checkForHits()) {
          gameOver();
          return;
        }
        moveSnake();
      }

      function moveSnake(){
        const tail = currentSnake.pop();
        squares[tail].classList.remove('snake');

        const newHead = currentSnake[0] + direction;
        currentSnake.unshift(newHead);

        // eat apple?
        if (squares[newHead].classList.contains('apple')) {
          squares[newHead].classList.remove('apple');
          // restore tail so snake grows
          currentSnake.push(tail);
          squares[tail].classList.add('snake');
          score++;
          scoreDisplay.textContent = 'Score: ' + score;
          clearInterval(intervalId);
          intervalTime = Math.max(60, Math.floor(intervalTime * speed));
          intervalId = setInterval(moveOutcome, intervalTime);
          randomApple();
        }

        squares[currentSnake[0]].classList.add('snake');
      }

      function checkForHits(){
        const head = currentSnake[0];
        const nextIndex = head + direction;

        // out of bounds vertically
        if (nextIndex < 0 || nextIndex >= totalSquares) return true;

        // left/right wrapping checks
        if (direction === 1 && head % width === width - 1) return true;
        if (direction === -1 && head % width === 0) return true;

        // hitting itself
        if (squares[nextIndex].classList.contains('snake')) return true;

        return false;
      }

      function randomApple(){
        // remove any existing apple
        squares.forEach(sq => sq.classList.remove('apple'));
        do {
          appleIndex = Math.floor(Math.random() * totalSquares);
        } while (squares[appleIndex].classList.contains('snake'));
        squares[appleIndex].classList.add('apple');
      }

      function gameOver(){
        clearInterval(intervalId);
        finalScore.textContent = 'Score: ' + score;
        popup.style.display = 'block';
      }

      // Controls
      function setDirection(newDir){
        // prevent reversing directly into itself
        if (newDir === -direction) return;
        direction = newDir;
      }

      function handleKey(e){
        switch (e.key) {
          case 'ArrowRight': setDirection(1); break;
          case 'ArrowLeft': setDirection(-1); break;
          case 'ArrowUp': setDirection(-width); break;
          case 'ArrowDown': setDirection(width); break;
        }
      }

      // attach listeners
      document.addEventListener('keydown', handleKey);
      btnUp.addEventListener('click', () => setDirection(-width));
      btnDown.addEventListener('click', () => setDirection(width));
      btnLeft.addEventListener('click', () => setDirection(-1));
      btnRight.addEventListener('click', () => setDirection(1));

      playAgainBtn.addEventListener('click', startGame);

      // initialize
      createBoard();
      startGame();
    })();
  </script>
</body>
</html>
